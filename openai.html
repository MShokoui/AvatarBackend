<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <link rel="icon" href="data:,">

  <title>HeadAudio - OpenRouter</title>

  <style>
    body, html {
      width:100%; height:100%; margin: 0; padding: 0; position: relative;
      background-color: #202020; color: white; overflow: hidden;
      font-family: Arial;
    }
    #head { position: absolute; top: 0; left: 0; right: 0; bottom: 0; }
    #avatar {
      display: block; width: 100%; height: 100%; position: absolute;
      top: 0; left: 0; right: 0; margin: 0; padding: 0;
    }
    #info {
      display: block; position: absolute; bottom: 10px; left: 10px;
      right: 10px; font-family: Arial; font-size: 20px;
    }
    #controls { position: absolute; top: 0; right: 0; margin: 10px; z-index: 10; }
    #github {
      position: absolute; bottom: 0; right: 0; margin: 10px; z-index: 10;
      width: 36px; height: 36px; 
    }
    #github svg { color: #404040; }
    #apikey { -webkit-text-security: square; }
    *[disabled] {
      opacity: 0.5; cursor: default; pointer-events: none;
    }
  </style>

  <script type="importmap">
  { "imports":
    {
      "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js/+esm",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/",
      "talkinghead": "https://cdn.jsdelivr.net/npm/@met4citizen/talkinghead@1.7/modules/talkinghead.mjs",
      "headaudio": "./dist/headaudio.min.mjs"
    }
  }
  </script>

  <script type="module">
    import { TalkingHead } from "talkinghead";
    import { HeadAudio } from "headaudio";

    /**
    * GLOBALS
    */

    // TalkingHead
    let head; // TalkingHead instance
    const avatar = {
      url: "./avatars/julia.glb",
      body: "F",
      avatarMood: "neutral"
    };

    // HeadAudio
    let headaudio; // HeadAudio instance
    const headaudioProcessor = "./dist/headworklet.min.mjs";
    const headaudioModel = "./dist/model-en-mixed.bin";
    
    // OpenRouter Chat Completions API (audio)
    const model = "openai/gpt-audio-mini";
    const voice = "alloy"; // Valid OpenAI audio voice
    const instructions = [
      "Your name is Julia. You are a clear, concise, and conversational English-speaking assistant.",
      "\nInteraction:",
      "- Listen for user speech, wait for a brief pause before responding. Avoid interrupting active user speech.",
      "- If unclear, ask a brief clarifying question.",
      "- Summarize only when explicitly asked.",
      "\nPersonality:",
      "- Be calm, helpful, and friendly.",
      "\nEmbodied avatar:",
      "- You have a human-like 3D avatar that the user can see.",
      "- To control the avatar, embed silent command tokens anywhere in your reply text. They will not be spoken.",
      "- Mood (pick one): [CMD:mood:neutral] [CMD:mood:happy] [CMD:mood:angry] [CMD:mood:sad] [CMD:mood:fear] [CMD:mood:disgust] [CMD:mood:love] [CMD:mood:sleep]",
      "- Gesture (pick one): [CMD:gesture:handup] [CMD:gesture:index] [CMD:gesture:ok] [CMD:gesture:thumbup] [CMD:gesture:thumbdown] [CMD:gesture:side] [CMD:gesture:shrug] [CMD:gesture:namaste]",
      "- Emoji (single face emoji): [CMD:emoji:😊]",
      "- Example: \"Hello! [CMD:mood:happy][CMD:gesture:handup] How can I help you today?\""
    ].join("\n");

    // Session state
    let sessionActive = false;
    let micStream = null;
    let mediaRecorder = null;
    let audioChunks = [];
    let isRecording = false;
    let isAISpeaking = false;
    let silenceTimer = null;
    let vadRafId = null;
    let analyserNode = null;
    let conversationHistory = [];
    let sessionApiKey = "";

    // VAD thresholds
    const VAD_SPEECH_DB = -40;   // dB above which audio is considered speech
    const VAD_SILENCE_MS = 1200; // ms of silence before sending the recorded turn
    const VAD_MIN_MS     = 300;  // minimum recording length to avoid sending noise

    /**
    * Parse and execute [CMD:type:value] tokens embedded in the AI transcript.
    * Returns the transcript with all CMD tokens stripped out.
    *
    * @param {string} text Raw transcript from AI.
    * @return {string} Cleaned transcript without CMD tokens.
    */
    function parseAndExecuteCmds(text) {
      return String(text || "").replace(/\[CMD:(\w+):([^\]]+)\]/g, (_, type, value) => {
        if (type === "mood") head.setMood(value);
        else if (type === "gesture") head.playGesture(value);
        else if (type === "emoji") head.speakEmoji(value);
        return ""; // strip token from spoken text
      });
    }

    // Other globals
    const el = {}; // DOM elements based in `id` property

    /**
    * Instantiate the TalkingHead class
    */
    function initHead() {
      head = new TalkingHead( el.avatar, {
        ttsEndpoint: "N/A",
        lipsyncModules: [],
        cameraView: "upper",
        mixerGainSpeech: 3,
        cameraDistance: -0.9,
        cameraRotateEnable: false,
        lightAmbientIntensity: 0,
        lightDirectIntensity: 0,
        lightSpotIntensity: 0
      });
      window.head = head; // For debugging
    }

    /**
    * Wrap a promise with a timeout that rejects if it takes too long.
    *
    * @param {Promise<T>} promise Promise to wrap.
    * @param {number} ms Timeout in milliseconds.
    * @param {Error} [error] Optional timeout error.
    * @return {Promise<T>} Promise that rejects on timeout.
    */
    function _withTimeout(promise, ms, error = new Error("Timeout")) {
      return new Promise((resolve, reject) => {
        const id = setTimeout(() => reject(error), ms);
        promise
          .then(val => { clearTimeout(id); resolve(val); })
          .catch(err => { clearTimeout(id); reject(err); });
      });
    }

    /**
    * Redact API-like secrets from text before logging or showing them.
    *
    * @param {string} s Text to sanitize.
    * @return {string} Sanitized text.
    */
    function redactSecrets(s) {
      return String(s || "")
        .replace(/sk-[A-Za-z0-9_-]+/g, "[REDACTED_API_KEY]")
        .replace(/Bearer\s+[A-Za-z0-9._-]+/gi, "Bearer [REDACTED]");
    }

    /**
    * Resumes the AudioContext, timing out after 2 seconds.
    */
    async function resumeAudio() {
      head.start();
      if (head.audioCtx.state !== "running") {
        try {
          await _withTimeout(head.audioCtx.resume(), 2000);
        } catch (e) {
          console.error(e);
        }
      }
    }

    /**
    * Instantiate Head Audio.
    */
    async function initHeadAudio() {

      // Register Worklet Processor
      await head.audioCtx.audioWorklet.addModule(headaudioProcessor);

      // Create the instance
      headaudio = new HeadAudio(head.audioCtx);
      window.headaudio = headaudio; // For debugging

      // Load the audio model
      try {
        await headaudio.loadModel(headaudioModel);
      } catch(error) {
        console.log(error);
      }

      // Connect speech gain node to lip-sync node
      head.audioSpeechGainNode.connect(headaudio);

      // Register callback function to set blend shape value
      headaudio.onvalue = (key,value) => {
        Object.assign( head.mtAvatar[ key ],{ newvalue: value, needsUpdate: true });
      };

      // Link update method to TalkingHead's animation loop
      head.opt.update = headaudio.update.bind(headaudio);

      // Make eye contact
      let lastEnded = 0;
      headaudio.onended = () => {
        lastEnded = Date.now();
      };

      headaudio.onstarted = () => {
        const duration = Date.now() - lastEnded;
        if ( duration > 150 ) {
          head.lookAtCamera(500);
          head.speakWithHands();
        }
      };
    }

    /**
    * Load the avatar
    */
    async function loadAvatar() {

      // Progress info
      const info = { head: "-" };
      const updateInfo = (n,ev) => {
        if ( ev ) {
          if ( ev.lengthComputable ) {
            info[n] = Math.min(100,Math.round(ev.loaded/ev.total * 100 )) + "%";
          } else {
            info[n] = Math.round(ev.loaded / 1000) + "KB";
          }
        }
        let s = "Loading: " + info.head ;
        if ( info.hasOwnProperty("error") ) {
          s += " ERROR:<br>&gt; " + info.error.replaceAll("\n","<br>&gt; ");
        }
        el.info.innerHTML = s;
      }

      // Load and show the avatar
      try {
        el.label.disabled = true;
        el.apikey.disabled = true;
        el.info.style.display = 'block';
        el.info.textContent = "Loading...";

        await head.showAvatar( avatar, updateInfo.bind(null,"head") );

        el.info.style.display = 'none';
        el.label.disabled = false;
        el.apikey.disabled = false;
      } catch (error) {
        console.log(error);
        info.error = error.message?.slice() || "Unknown error.";
        updateInfo();
      }

    }

    /**
    * Start a new turn-based session using OpenRouter chat completions audio API.
    * Sets up the microphone, VAD loop, and sends an initial greeting turn.
    */
    async function startSession() {
      console.log("Session starting...");

      // Capture API key once at connect time
      sessionApiKey = (el.apikey.value || "").trim();
      if (sessionApiKey.toLowerCase().startsWith("bearer ")) {
        sessionApiKey = sessionApiKey.slice(7).trim();
      }
      if (!sessionApiKey) {
        el.info.style.display = 'block';
        el.info.textContent = "Error: Missing OpenRouter API key.";
        return;
      }

      try {
        micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
      } catch (err) {
        console.error("Error accessing mic:", err);
        return;
      }

      try {
        el.connection.disabled = true;
        el.info.style.display = 'block';
        el.info.textContent = "Connecting...";

        // Analyser for VAD
        const micSource = head.audioCtx.createMediaStreamSource(micStream);
        analyserNode = head.audioCtx.createAnalyser();
        analyserNode.fftSize = 2048;
        micSource.connect(analyserNode);

        // MediaRecorder
        mediaRecorder = new MediaRecorder(micStream);
        mediaRecorder.ondataavailable = (e) => {
          if (e.data.size > 0) audioChunks.push(e.data);
        };
        mediaRecorder.onstop = async () => {
          const chunks = audioChunks.splice(0);
          if (chunks.length && sessionActive) {
            const blob = new Blob(chunks, { type: mediaRecorder.mimeType });
            await sendTurn(blob);
          }
        };

        sessionActive = true;
        conversationHistory = [];

        el.info.style.display = 'none';
        el.label.style.display = "none";
        el.apikey.style.display = "none";
        el.connection.disabled = false;
        el.connection.value = "Disconnect";

        // Send first greeting turn via a text prompt (no audio needed to start)
        await sendTurn(null);

      } catch (err) {
        console.error("Error starting session:", err);
        el.info.textContent = redactSecrets(err.message) || "Unknown error.";
        endSession(true);
      }
    }

    /**
    * Start the VAD-driven recording loop.
    * Monitors mic levels and starts/stops MediaRecorder around speech segments.
    */
    function startListening() {
      if (!sessionActive || isAISpeaking || !analyserNode) return;

      let recordingStartTime = 0;
      const dataArray = new Float32Array(analyserNode.fftSize);

      const loop = () => {
        if (!sessionActive || isAISpeaking) return;
        vadRafId = requestAnimationFrame(loop);

        analyserNode.getFloatTimeDomainData(dataArray);
        let sum = 0;
        for (let i = 0; i < dataArray.length; i++) sum += dataArray[i] * dataArray[i];
        const db = 20 * Math.log10(Math.sqrt(sum / dataArray.length) + 1e-10);
        const hasSpeech = db > VAD_SPEECH_DB;

        if (hasSpeech) {
          if (!isRecording) {
            isRecording = true;
            recordingStartTime = Date.now();
            audioChunks = [];
            mediaRecorder.start(100);
            head.lookAtCamera(500);
          }
          clearTimeout(silenceTimer);
          silenceTimer = null;
        } else if (isRecording && !silenceTimer) {
          silenceTimer = setTimeout(() => {
            silenceTimer = null;
            if (isRecording) {
              isRecording = false;
              if ((Date.now() - recordingStartTime) >= VAD_MIN_MS) {
                mediaRecorder.stop(); // triggers onstop -> sendTurn
              } else {
                audioChunks = [];
                try { mediaRecorder.stop(); } catch (_) {}
              }
            }
          }, VAD_SILENCE_MS);
        }
      };

      vadRafId = requestAnimationFrame(loop);
    }

    /**
    * Stop the VAD loop and any in-progress recording.
    */
    function stopListening() {
      if (vadRafId) { cancelAnimationFrame(vadRafId); vadRafId = null; }
      clearTimeout(silenceTimer); silenceTimer = null;
      if (isRecording) {
        isRecording = false;
        try { if (mediaRecorder?.state !== "inactive") mediaRecorder.stop(); } catch (_) {}
      }
    }

    /**
    * Convert decoded audio buffer into WAV bytes (PCM16, mono).
    *
    * @param {AudioBuffer} audioBuffer Decoded audio.
    * @return {Uint8Array} WAV byte array.
    */
    function audioBufferToWavBytes(audioBuffer) {
      const sampleRate = audioBuffer.sampleRate;
      const channels = audioBuffer.numberOfChannels;
      const frameCount = audioBuffer.length;
      const wavDataBytes = frameCount * 2; // mono, 16-bit
      const buf = new ArrayBuffer(44 + wavDataBytes);
      const view = new DataView(buf);

      const writeStr = (off, str) => {
        for (let i = 0; i < str.length; i++) view.setUint8(off + i, str.charCodeAt(i));
      };

      writeStr(0, "RIFF");
      view.setUint32(4, 36 + wavDataBytes, true);
      writeStr(8, "WAVE");
      writeStr(12, "fmt ");
      view.setUint32(16, 16, true);      // PCM header size
      view.setUint16(20, 1, true);       // PCM format
      view.setUint16(22, 1, true);       // mono
      view.setUint32(24, sampleRate, true);
      view.setUint32(28, sampleRate * 2, true); // mono * 16-bit
      view.setUint16(32, 2, true);       // block align
      view.setUint16(34, 16, true);      // bits per sample
      writeStr(36, "data");
      view.setUint32(40, wavDataBytes, true);

      const output = new Int16Array(buf, 44, frameCount);
      const channelData = [];
      for (let c = 0; c < channels; c++) channelData.push(audioBuffer.getChannelData(c));

      for (let i = 0; i < frameCount; i++) {
        let sample = 0;
        for (let c = 0; c < channels; c++) sample += channelData[c][i];
        sample /= channels;
        sample = Math.max(-1, Math.min(1, sample));
        output[i] = sample < 0 ? sample * 0x8000 : sample * 0x7FFF;
      }

      return new Uint8Array(buf);
    }

    /**
    * Convert a recorded browser audio Blob (e.g. webm) into base64 WAV.
    *
    * @param {Blob} blob Recorded audio blob.
    * @return {Promise<string>} Base64-encoded WAV bytes.
    */
    async function convertBlobToWavBase64(blob) {
      const ab = await blob.arrayBuffer();
      const decoded = await head.audioCtx.decodeAudioData(ab.slice(0));
      const wavBytes = audioBufferToWavBytes(decoded);
      let bin = "";
      for (let i = 0; i < wavBytes.length; i++) bin += String.fromCharCode(wavBytes[i]);
      return btoa(bin);
    }

    /**
    * Send one conversation turn to OpenRouter and handle the response.
    * If blob is null, sends a text prompt to trigger the AI's initial greeting.
    *
    * @param {Blob|null} blob Recorded audio blob, or null for text-only prompt.
    */
    async function sendTurn(blob) {
      stopListening();
      el.info.style.display = 'block';
      el.info.textContent = "Thinking...";

      try {
        let userMessage;
        if (blob) {
          const b64 = await convertBlobToWavBase64(blob);
          userMessage = {
            role: "user",
            content: [{ type: "input_audio", input_audio: { data: b64, format: "wav" } }]
          };
        } else {
          userMessage = { role: "user", content: "Please introduce yourself and ask how you can help." };
        }

        conversationHistory.push(userMessage);

        const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
          method: "POST",
          headers: {
            "Authorization": `Bearer ${sessionApiKey}`,
            "Content-Type": "application/json",
            "HTTP-Referer": window.location.origin,
            "X-OpenRouter-Title": "HeadAudio"
          },
          body: JSON.stringify({
            model: model,
            stream: true,
            modalities: ["text", "audio"],
            audio: { voice: voice, format: "pcm16" },
            messages: [
              { role: "system", content: instructions },
              ...conversationHistory
            ]
          })
        });

        if (!response.ok) {
          const errText = await response.text();
          throw new Error(
            `OpenRouter API error ${response.status} ${response.statusText}\n` +
            redactSecrets(errText)
          );
        }

        // Read SSE stream, accumulating audio base64 chunks and transcript
        let audioB64 = "";
        let transcriptParts = [];

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });

          // Process all complete SSE lines in the buffer
          const lines = buffer.split("\n");
          buffer = lines.pop(); // keep the last (possibly incomplete) line

          for (const line of lines) {
            if (!line.startsWith("data: ")) continue;
            const payload = line.slice(6).trim();
            if (payload === "[DONE]") break;
            let chunk;
            try { chunk = JSON.parse(payload); } catch (_) { continue; }

            const delta = chunk.choices?.[0]?.delta;
            if (!delta) continue;

            // Audio base64 chunk
            if (delta.audio?.data) audioB64 += delta.audio.data;

            // Transcript delta (may come via delta.audio.transcript or delta.content)
            if (delta.audio?.transcript) transcriptParts.push(delta.audio.transcript);
            else if (typeof delta.content === "string") transcriptParts.push(delta.content);
          }
        }

        const rawTranscript = transcriptParts.join("");

        // Execute embedded [CMD:...] tokens and strip them from the stored transcript
        const cleanTranscript = parseAndExecuteCmds(rawTranscript);
        conversationHistory.push({ role: "assistant", content: cleanTranscript });

        el.info.style.display = 'none';

        if (audioB64) {
          await playAudioResponse(audioB64);
        } else {
          if (sessionActive) startListening();
        }

      } catch (err) {
        console.error("Turn error:", err);
        const msg = redactSecrets(err.message) || "Error";
        el.info.style.display = 'block';
        el.info.textContent = `Error: ${msg.slice(0, 500)}`;
        if (sessionActive) startListening();
      }
    }

    /**
    * Wrap raw PCM16 bytes (16-bit signed, mono, 24 kHz) in a WAV container
    * so AudioContext.decodeAudioData() can handle it.
    *
    * @param {Uint8Array} pcmBytes Raw PCM16 bytes.
    * @return {ArrayBuffer} A complete WAV file buffer.
    */
    function pcm16ToWav(pcmBytes) {
      const sampleRate = 24000;
      const numChannels = 1;
      const bitsPerSample = 16;
      const byteRate = sampleRate * numChannels * (bitsPerSample / 8);
      const blockAlign = numChannels * (bitsPerSample / 8);
      const dataLen = pcmBytes.byteLength;
      const buf = new ArrayBuffer(44 + dataLen);
      const view = new DataView(buf);
      const writeStr = (off, s) => { for (let i = 0; i < s.length; i++) view.setUint8(off + i, s.charCodeAt(i)); };
      writeStr(0, "RIFF");
      view.setUint32(4, 36 + dataLen, true);
      writeStr(8, "WAVE");
      writeStr(12, "fmt ");
      view.setUint32(16, 16, true);          // chunk size
      view.setUint16(20, 1, true);           // PCM
      view.setUint16(22, numChannels, true);
      view.setUint32(24, sampleRate, true);
      view.setUint32(28, byteRate, true);
      view.setUint16(32, blockAlign, true);
      view.setUint16(34, bitsPerSample, true);
      writeStr(36, "data");
      view.setUint32(40, dataLen, true);
      new Uint8Array(buf, 44).set(pcmBytes);
      return buf;
    }

    /**
    * Decode a base64 PCM16 response from the API, wrap it in a WAV header,
    * and play it through the Web Audio graph so HeadAudio can drive lip-sync.
    *
    * @param {string} b64 Base64-encoded PCM16 audio.
    */
    async function playAudioResponse(b64) {
      const binary = atob(b64);
      const pcmBytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) pcmBytes[i] = binary.charCodeAt(i);

      const wavBuffer = pcm16ToWav(pcmBytes);

      let audioBuffer;
      try {
        audioBuffer = await head.audioCtx.decodeAudioData(wavBuffer);
      } catch (err) {
        console.error("Failed to decode AI audio:", err);
        if (sessionActive) startListening();
        return;
      }

      const source = head.audioCtx.createBufferSource();
      source.buffer = audioBuffer;
      // Route through speech gain so HeadAudio processes it for lip-sync
      source.connect(head.audioSpeechGainNode);

      isAISpeaking = true;
      head.isSpeaking = true;
      source.start();

      source.onended = () => {
        isAISpeaking = false;
        head.isSpeaking = false;
        if (sessionActive) startListening();
      };
    }

    /**
    * End the session: stop VAD, recording, and microphone.
    *
    * @param {boolean} silent If true, skips UI updates.
    */
    async function endSession(silent=false) {
      sessionActive = false;

      stopListening();

      if (mediaRecorder && mediaRecorder.state !== "inactive") {
        try { mediaRecorder.stop(); } catch (_) {}
      }
      mediaRecorder = null;
      audioChunks = [];

      if (micStream) {
        micStream.getTracks().forEach(t => { try { t.stop(); } catch (_) {} });
        micStream = null;
      }

      analyserNode = null;
      isRecording = false;
      isAISpeaking = false;
      conversationHistory = [];
      sessionApiKey = "";

      if (!silent) {
        el.info.style.display = "none";
      }

      el.label.style.display = "inline-block";
      el.apikey.style.display = "inline-block";
      el.connection.disabled = false;
      el.connection.value = "Connect";

      console.log("Session ended.");
    }


    // WEB PAGE LOADED
    document.addEventListener('DOMContentLoaded', async function(e) {

      // Get all DOM elements with an `id`
      document.querySelectorAll('[id]').forEach( x => el[x.id] = x );

      // Init head and headaudio
      initHead();
      await initHeadAudio();

      // API key
      const fnApikey = () => el.connection.disabled = !el.apikey.value;
      el.apikey.addEventListener("change", fnApikey);
      el.apikey.addEventListener("input", fnApikey);

      // Connect/disconnect
      el.connection.addEventListener("click", async function(e) {
        const connect = el.connection.value ===  "Connect";
        if ( connect ) {
          await resumeAudio();
          startSession();
        } else {
          endSession();
        }
      });

      // Pause animation when document is not visible
      document.addEventListener("visibilitychange", async function () {
        if (document.visibilityState === "visible") {
          head.start();
          headaudio.start();
        } else {
          headaudio.stop();
          head.stop();
        }
      });

      // Load the avatar
      await loadAvatar();

    });

  </script>
</head>

<body>
  <div id="head">
    <div id="avatar"></div>
    <div id="info"></div>
  </div>
  <div id="controls">
    <label id="label" for="apikey" disabled>OpenRouter:</label>
    <input id="apikey" name="apikey" type="text" placeholder="OpenRouter API Key" disabled/>
    <input id="connection" type="button" value="Connect" disabled/>
  </div>
  <div id="github">
